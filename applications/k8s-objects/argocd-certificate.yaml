apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-ca
  namespace: argocd
spec:
  secretName: argocd-ca
  isCA: true
  issuerRef:
    name: internal-ca
    kind: ClusterIssuer
  commonName: ArgoCD Internal CA
  duration: 87600h
  renewBefore: 8760h
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: argocd-ca-issuer
  namespace: argocd
spec:
  ca:
    secretName: argocd-ca
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: argocd
spec:
  secretName: argocd-tls
  issuerRef:
    name: argocd-ca-issuer
    kind: Issuer
  dnsNames:
    - argocd.local
    - argocd
    - argocd.argocd.svc
    - argocd.argocd.svc.cluster.local
    - localhost
  duration: 8760h
  renewBefore: 720h
apiVersion: v1
kind: ServiceAccount
metadata:
  name: istio-ingressgateway
  namespace: istio-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: istio-ingressgateway
  namespace: istio-system
  labels:
    app: istio-ingressgateway
    istio: ingressgateway
spec:
  selector:
    matchLabels:
      app: istio-ingressgateway
      istio: ingressgateway
  template:
    metadata:
      labels:
        app: istio-ingressgateway
        istio: ingressgateway
    spec:
      serviceAccountName: istio-ingressgateway
      containers:
        - name: istio-proxy
          image: docker.io/istio/proxyv2:1.29.1
          imagePullPolicy: IfNotPresent
          args:
            - proxy
            - router
            - --domain
            - $(POD_NAMESPACE).svc.cluster.local
            - --proxyLogLevel=warning
            - --proxyComponentLogLevel=misc:error
            - --log_output_level=info
          ports:
            - containerPort: 15021
              name: status-port
            - containerPort: 80
              name: http2
            - containerPort: 443
              name: https
            - containerPort: 15090
              name: http-envoy-prom
              protocol: TCP
          env:
            - name: JWT_POLICY
              value: third-party-jwt
            - name: PILOT_CERT_PROVIDER
              value: istiod
            - name: CA_ADDR
              value: istiod.istio-system.svc:15012
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: INSTANCE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: ISTIO_META_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ISTIO_META_APP_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app']
            - name: ISTIO_META_APP_HELM_VERSION
              value: "1.29.1"
            - name: ISTIO_META_METADATA_URL
              value: ""
            - name: ISTIO_META_CLUSTER_NAME
              value: "Kubernetes"
            - name: ISTIO_META_ENVOY_VERSION
              value: ""
            - name: ISTIO_META_DNS_CAPTURE
              value: "false"
            - name: ISTIO_META_NO_ZERO_COPY
              value: "true"
            - name: PROXY_CONFIG
              value: |
                {"proxyMetadata":{"DNS_AGENT":""}}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 2000m
              memory: 1Gi
          securityContext:
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            runAsUser: 0
            runAsGroup: 1337
            runAsNonRoot: false
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: workload-socket
              mountPath: /var/run/secrets/workload-spife-uds
            - name: credential-socket
              mountPath: /var/run/secrets/credential-uds
            - name: pod-root-ca
              mountPath: /etc/pod-root-ca
            - name: istio-certs
              mountPath: /etc/certs
              readOnly: true
            - name: istio-envoy
              mountPath: /etc/istio/proxy
          readinessProbe:
            httpGet:
              path: /healthz/ready
              port: 15021
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            postStart:
              exec:
                command:
                  - pilot-agent
                  - wait
      volumes:
        - name: workload-socket
        - name: credential-socket
        - name: pod-root-ca
          configMap:
            name: kube-root-ca.crt
        - name: istio-certs
          secret:
            secretName: istio.istio-ingressgateway-service-account
            optional: true
        - name: istio-envoy
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: istio-ingressgateway
  namespace: istio-system
  labels:
    app: istio-ingressgateway
    istio: ingressgateway
spec:
  type: LoadBalancer
  selector:
    app: istio-ingressgateway
    istio: ingressgateway
  ports:
    - name: status-port
      port: 15021
      targetPort: 15021
      protocol: TCP
    - name: http2
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP

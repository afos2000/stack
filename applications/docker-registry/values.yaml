# -- Number of replicas
replicaCount: 1

# -- Docker registry image
image:
  repository: registry
  tag: "2"
  pullPolicy: IfNotPresent

# -- Pull-through cache configuration
proxy:
  # -- Remote registry to proxy/cache
  remoteUrl: "https://registry-1.docker.io"
  # -- Existing secret name with REGISTRY_PROXY_USERNAME and REGISTRY_PROXY_PASSWORD
  # -- If set, deployed via ExternalSecret from Vault
  existingSecret:
    name: docker-hub-creds
    usernameKey: REGISTRY_PROXY_USERNAME
    passwordKey: REGISTRY_PROXY_PASSWORD

# -- Storage configuration
persistence:
  enabled: true
  size: 50Gi
  storageClass: longhorn
  accessMode: ReadWriteOnce

# -- Resource limits (no CPU limits to avoid throttling)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

# -- Service configuration
service:
  type: ClusterIP
  port: 5000

# -- Ingress (disable for ClusterIP-only)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# -- Docker registry config overrides (YAML passed to REGISTRY_CONFIG)
config:
  # Additional config keys merged into registry config
  http:
    debug:
      enabled: false
  storage:
    delete:
      enabled: true
  middleware: {}

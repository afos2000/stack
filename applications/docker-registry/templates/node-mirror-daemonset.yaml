apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k3s-mirror-configurer
  labels:
    app.kubernetes.io/component: mirror-configurer
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    description: "Configures k3s containerd mirror to use local docker-registry as primary for docker.io, with default endpoint disabled"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: mirror-configurer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mirror-configurer
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      tolerations:
        - operator: Exists
          effect: NoSchedule
      hostPID: true
      initContainers:
        - name: write-config
          image: alpine:3.19
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-etc-rancher
              mountPath: /host/etc/rancher
          command:
            - sh
            - -c
            - |
              set -e
              K3S_DIR="/host/etc/rancher/k3s"
              mkdir -p "$K3S_DIR"

              # Resolve docker-registry cluster IP from DNS (works inside pod)
              REGISTRY_IP=$(getent hosts docker-registry.{{ .Release.Namespace }}.svc.cluster.local 2>/dev/null | awk '{print $1}' || \
                nslookup docker-registry.{{ .Release.Namespace }}.svc.cluster.local 2>/dev/null | tail -1 | awk '{print $3}')

              # Write registries.yaml with local cache as mirror
              cat > "$K3S_DIR/registries.yaml" <<YAML
              mirrors:
                docker.io:
                  endpoint:
                    - "http://${REGISTRY_IP}:5000"
              YAML

              # Write config.yaml with disable-default-registry-endpoint
              # so containerd only pulls from configured mirrors
              CONFIG="$K3S_DIR/config.yaml"
              if ! grep -q "disable-default-registry-endpoint" "$CONFIG" 2>/dev/null; then
                echo "disable-default-registry-endpoint: true" >> "$CONFIG"
              fi

              echo "Mirror config written on $(hostname)"
              echo "=== registries.yaml ==="
              cat "$K3S_DIR/registries.yaml"
              echo "=== config.yaml ==="
              cat "$K3S_DIR/config.yaml"
      containers:
        - name: done
          image: alpine:3.19
          command: ["sh", "-c", "sleep infinity"]
      volumes:
        - name: host-etc-rancher
          hostPath:
            path: /etc/rancher
            type: DirectoryOrCreate
      restartPolicy: Always

apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  labels:
    app.kubernetes.io/name: docker-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: docker-registry
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docker-registry
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: registry
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5000
              name: registry
            - containerPort: 5001
              name: debug
          env:
            - name: REGISTRY_HTTP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-http-secret
                  key: secret
                  optional: true
{{- if and .Values.proxy.existingSecret.name .Values.proxy.remoteUrl }}
            - name: REGISTRY_PROXY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxy.existingSecret.name }}
                  key: {{ .Values.proxy.existingSecret.usernameKey }}
            - name: REGISTRY_PROXY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.proxy.existingSecret.name }}
                  key: {{ .Values.proxy.existingSecret.passwordKey }}
{{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/docker/registry
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /var/lib/registry
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: docker-registry-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: docker-registry-data
        {{- end }}

apiVersion: v1
kind: Service
metadata:
  name: docker-registry
  labels:
    app.kubernetes.io/name: docker-registry
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 5000
      name: registry
  selector:
    app.kubernetes.io/name: docker-registry
    app.kubernetes.io/instance: {{ .Release.Name }}

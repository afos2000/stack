apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-argocd
  labels:
    app: keycloak
data:
  realm-argocd.json: |
    {
      "realm": "argocd",
      "enabled": true,
      "displayName": "ArgoCD",
      "registrationAllowed": true,
      "registrationEmailAsUsername": true,
      "clients": [
        {
          "clientId": "argocd",
          "enabled": true,
          "protocol": "openid-connect",
          "clientAuthenticatorType": "client-secret",
          "standardFlowEnabled": true,
          "redirectUris": [
            "https://argocd.andreskube.uk/auth/callback"
          ],
          "webOrigins": ["+"],
          "protocolMappers": [
            {
              "name": "realm-roles",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "config": {
                "multivalued": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "groups",
                "userinfo.token.claim": "true"
              }
            }
          ]
        }
      ],
      "roles": {
        "realm": [
          {
            "name": "argocd-admin"
          },
          {
            "name": "argocd-readonly"
          }
        ]
      }
    }

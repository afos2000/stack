keycloakx:
  replicas: 1

  args:
    - start
    - --import-realm

  image:
    registry: quay.io
    repository: keycloak/keycloak
    tag: 26.5.6

  database:
    vendor: postgres
    hostname: keycloak-db-rw.postgres.svc
    port: 5432
    database: keycloak
    username: keycloak
    existingSecret: keycloak-db-keycloak
    existingSecretPasswordKey: password

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 2Gi

  http:
    relativePath: "/"

  extraEnv: |
    - name: KC_HOSTNAME
      value: "https://keycloak.andreskube.uk"
    - name: KC_HOSTNAME_STRICT
      value: "false"
    - name: KC_HOSTNAME_BACKCHANNEL_DYNAMIC
      value: "true"
    - name: KC_BOOTSTRAP_ADMIN_USERNAME
      value: admin
    - name: KC_BOOTSTRAP_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: keycloak-admin
          key: password

  lifecycleHooks: |
    postStart:
      exec:
        command:
          - /bin/bash
          - -c
          - |
            for i in {1..30}; do
              /opt/keycloak/bin/kcadm.sh config credentials --server http://localhost:8080 --realm master --user "${KC_BOOTSTRAP_ADMIN_USERNAME}" --password "${KC_BOOTSTRAP_ADMIN_PASSWORD}" && break
              sleep 2
            done
            /opt/keycloak/bin/kcadm.sh update realms/argocd -f /opt/keycloak/data/import/realm-argocd.json 2>/dev/null || true
            /opt/keycloak/bin/kcadm.sh create realms -f /opt/keycloak/data/import-backstage/realm-backstage.json 2>/dev/null || true

  service:
    type: ClusterIP

  ingress:
    enabled: false

  extraVolumes: |
    - name: realm-import
      configMap:
        name: keycloak-realm-argocd
    - name: realm-import-backstage
      configMap:
        name: keycloak-realm-backstage

  extraVolumeMounts: |
    - name: realm-import
      mountPath: /opt/keycloak/data/import/
    - name: realm-import-backstage
      mountPath: /opt/keycloak/data/import-backstage/
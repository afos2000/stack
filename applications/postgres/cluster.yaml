apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db
  namespace: postgres
spec:
  instances: 1

  storage:
    size: 10Gi
    storageClass: longhorn

  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: test-hello
  namespace: external-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-store
    kind: ClusterSecretStore
  target:
    name: test-hello
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: message
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: secrets/data/test-hello
        metadataPolicy: None
        nullBytePolicy: Ignore
        property: message

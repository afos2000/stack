apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault
    targetRevision: 0.32.0
    helm:
      releaseName: vault
      values: |
        global:
          tlsDisable: true

        injector:
          enabled: true
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi

        server:
          image:
            repository: hashicorp/vault
            tag: 1.21.2
            pullPolicy: IfNotPresent

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          ha:
            enabled: true
            replicas: 3
            raft:
              enabled: true
              setNodeId: true
              config: |
                ui = true

                listener "tcp" {
                  tls_disable = 1
                  address = "[::]:8200"
                  cluster_address = "[::]:8201"
                }

                storage "raft" {
                  path = "/vault/data"
                }

                service_registration "kubernetes" {}

            disruptionBudget:
              enabled: true
              maxUnavailable: 1

          serviceAccount:
            create: true

          dataStorage:
            enabled: true
            size: 10Gi
            storageClass: longhorn
            resources:
              requests:
                storage: 10Gi

          auditStorage:
            enabled: false

          service:
            enabled: true
            type: ClusterIP
            port: 8200
            targetPort: 8200

        ui:
          enabled: true
          serviceType: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

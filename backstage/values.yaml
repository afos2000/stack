backstage:
  replicas: 1

  image:
    registry: docker.io
    repository: afos2000/backstage
    tag: "1.51.0-f0d8664"
    pullPolicy: IfNotPresent

  appConfig:
    app:
      title: AndresKube Homelab Services

    backend:
      database:
        client: pg
        connection:
          host: keycloak-db-rw.postgres.svc
          port: 5432
          user: backstage
          password: ${BACKSTAGE_DB_PASSWORD}
      cors:
        origin: https://platform-apps.andreskube.uk

    techdocs:
      builder: local
      generator:
        runIn: local
      publisher:
        type: local

    catalog:
      rules:
        - allow:
          - Component
          - API
          - Group
          - User
          - Resource
          - System
          - Location
          - Template

  extraEnvVars:
    - name: BACKSTAGE_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: backstage-db-backstage
          key: password
    - name: KEYCLOAK_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-keycloak-secret
          key: client-secret
    - name: BACKEND_SECRET
      valueFrom:
        secretKeyRef:
          name: backstage-auth-secret
          key: session-secret

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

service:
  type: ClusterIP
  ports:
    backend: 7007

postgresql:
  enabled: false

ingress:
  enabled: false
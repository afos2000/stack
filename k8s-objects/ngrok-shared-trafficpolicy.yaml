apiVersion: ngrok.k8s.ngrok.com/v1alpha1
kind: NgrokTrafficPolicy
metadata:
  name: shared-traffic-policy
  namespace: ngrok
spec:
  # The operator's CRD expects a raw `policy` object matching the ngrok API
  # keys (snake_case). Use the same structure the operator emits when it
  # created the ArgoCD AgentEndpoint earlier.
  policy:
    on_http_request:
      - name: Initialize-Local-Service-Match
        actions:
          - type: set-vars
            config:
              vars:
                - request_matched_local_svc: false

      - name: Generated-Local-Service-Route
        expressions:
          - "req.url.path.startsWith('/')"
          - "vars.request_matched_local_svc == false"
        actions:
          - type: set-vars
            config:
              vars:
                - request_matched_local_svc: true

      - name: Fallback-404
        expressions:
          - "vars.request_matched_local_svc == false"
        actions:
          - type: custom-response
            config:
              status_code: 404
              headers:
                content-type: text/plain
              content: "No route was found for this ngrok Endpoint"
